<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NusantaraExport.AI — Platform AI untuk membantu UMKM Indonesia ekspor ke pasar global. Mudah, cepat, dan gratis." />
    <title>NusantaraExport.AI — Bantu UMKM Ekspor ke Dunia</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#FFFFFF',
              secondary: '#1A1A1A',
              accent: '#C41E3A',
              'accent-light': '#FEE2E2',
              'slate-soft': '#F8FAFC',
            },
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
              display: ['"Outfit"', 'sans-serif'],
            },
            animation: {
              fadeInUp: 'fadeInUp 0.8s ease-out forwards',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          },
        },
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: #FFFFFF;
        color: #1A1A1A;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; border: none; outline: none; font-family: inherit; }
      .font-display { font-family: 'Outfit', sans-serif; }
      .danantara-card {
        background: white;
        border: 1px solid #E2E8F0;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .danantara-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }
      .btn-primary {
        background-color: #C41E3A;
        color: white;
        padding: 0.75rem 1.75rem;
        border-radius: 0.625rem;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.2s;
      }
      .btn-primary:hover {
        background-color: #A51731;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
