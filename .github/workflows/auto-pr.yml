name: Auto Create PR

on:
  push:
    # Trigger on any branch push, except 'main'
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Pull Request with GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the current branch name
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          
          # Use GitHub CLI (gh) to create a Pull Request
          # If it fails (e.g., PR already exists), it will skip silently
          gh pr create \
            --title "🚀 Auto PR: $BRANCH_NAME" \
            --body "Halo Tim! Pull Request ini dibuat secara otomatis melalui Push di cabang: **$BRANCH_NAME**. Mohon untuk direview dan dilakukan merging jika sudah sesuai standar NusantaraExport.AI." \
            --base main \
            --head $BRANCH_NAME || echo "PR already exists for $BRANCH_NAME or could not be created."
